<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">

		<!-- CSS files -->
		<link rel="stylesheet" href="css/reset.css" />
		<link rel="stylesheet" href="css/jquery-ui-yellow.css">
		<link rel="stylesheet" href="css/survive.css" />
		<link rel="stylesheet" href="https://use.typekit.net/ymr0rkd.css">
	

		<!-- jQuery and Javascript files -->
		<script src="js/jquery-3.3.1.min.js"></script>
		<script src="js/jquery-ui.min.js"></script>
		<script src="js/survive.js"></script>

		<title>Survive the Day</title>
	</head>

	<body>

		<div class="back"></div>
		<div class="paper">
			<img class="purple" src="images/paper-purple.jpg">
			<img class="time" src="images/InteractiveTime.png">

			<img class="Desk-dis" src="images/desk- interactive.png">
			<img class="Pinterest" src="images/ComputaDis.png">

			<!-- prompt -->
			<p id="X-link" class="X">X</p>	

			<div id="X" title="Get off your computer?"></div>

		</div>


			<a href="Index.html">
				<img class="exit" src="images/Exit.png">
			</a>


			<img class="washipurp" src="images/forpurple.png">
			

			<img id="help-link" class="help" src="images/Help.png">
			
			<div id="help" title="Instructions">
				<ul>
					<li>Progress through the day by interacting with items.</li>
					<li>After interacting on items a choice will pop up, select one of the options.</li>
					<li>Interactible items will grow and a the mouse will become a hand. </li>
					<li>Click the bed to restart your day.</li>
					<li>Click the play button to start music</li>
				</ul>
			</div>

			<!-- <img class="music" src="images/musical-note.png">  -->

			<audio controls src="sound/Game Music.m4a" loop></audio>



	</body>

</html>
