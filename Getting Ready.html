<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="referrer" content="origin"/>


		<!-- CSS files -->
		<link rel="stylesheet" href="css/reset.css" />
		<link rel="stylesheet" href="css/jquery-ui-green.css">
		<link rel="stylesheet" href="css/survive.css" />
		<link rel="stylesheet" href="https://use.typekit.net/ymr0rkd.css">

		<!-- jQuery and Javascript files -->
		<script src="js/jquery-3.3.1.min.js"></script>
		<script src="js/jquery-ui.min.js"></script>
		<script src="js/survive.js"></script>

		<title>Survive the Day</title>
	</head>

	<body>

		<div class="back"></div>
		<div class="paper">
			<img class="pink" src="images/paper- pink.jpg">
			<img class="time" src="images/ReadyTime.png">


			<img class="counter" src="images/counter.png">
			

			<img id="mirror-link" class="mirror" src="images/mirror.png">

			<div id="mirror" title="Are you done getting ready?"></div>


			<!-- items -->
			<img class="foundation" src="images/foundation.png">
			<img class="mascara" src="images/mascara.png">
			<img class="lip" src="images/lipstick.png">
			<img class="blender" src="images/beauty blender.png">
			<img class="phonesm" src="images/Phone.png">
			<div class="inphonesm"></div>

			<iframe class="inphonesm" width="119" height="55" src="https://www.youtube.com/embed/afZYZUJ1tI4?si=hluFATXBrXsYVQdp" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
		
		</div>


			<a href="Index.html">
				<img class="exit" src="images/Exit.png">
			</a>



			<img class="washipnk" src="images/forpink.png">


			<!-- instructions -->
			<img id="help-link" class="help" src="images/Help.png">

			<div id="help" title="Instructions">
				<ul>
					<li>Progress through the day by interacting with items.</li>
					<li>After interacting on items a choice will pop up, select one of the options.</li>
					<li>Interactible items will grow and a the mouse will become a hand. </li>
					<li>Click the bed to restart your day.</li>
					<li>Click the play button to start music</li>
				</ul>
			</div>

			<!-- <img class="music" src="images/musical-note.png">  -->

			<audio controls src="sound/Game Music.m4a" loop></audio>

	</body>

</html>
